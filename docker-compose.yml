services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/access_poc
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      ADMIN_API_KEY: admin-dev-key
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m app.outbox_worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/access_poc
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      ADMIN_API_KEY: admin-dev-key
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: access_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6380:6379"
